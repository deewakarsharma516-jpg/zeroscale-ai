<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroScale AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#6c63ff,#3ecfcf);padding:20px;text-align:center}
.header h1{font-size:28px;font-weight:900}
.header p{opacity:.8;font-size:14px}
.modes{display:flex;gap:10px;padding:15px}
.mode-btn{flex:1;padding:12px;border:none;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;opacity:0.7}
.mode-btn.student{background:#4CAF50;color:#fff}
.mode-btn.business{background:#6c63ff;color:#fff;opacity:1}
.mode-btn.health{background:#e91e8c;color:#fff}
.mode-label{text-align:center;padding:8px;background:#1e1e2e;font-size:12px;color:#aaa}
.chat-area{flex:1;padding:15px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
.msg{padding:12px 16px;border-radius:16px;max-width:85%;font-size:14px;line-height:1.5;white-space:pre-wrap}
.user-msg{background:#6c63ff;align-self:flex-end;color:#fff}
.ai-msg{background:#1e1e2e;border:1px solid #333;align-self:flex-start}
.input-area{display:flex;padding:15px;gap:10px;background:#111;position:fixed;bottom:0;width:100%}
.input-area input{flex:1;padding:12px;border-radius:25px;border:1px solid #333;background:#1e1e2e;color:#fff;font-size:14px}
.send-btn{padding:12px 20px;background:linear-gradient(135deg,#6c63ff,#3ecfcf);border:none;border-radius:25px;color:#fff;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="header">
<h1>⚡ ZeroScale AI</h1>
<p>India ka AI Assistant — Hindi & English</p>
</div>
<div class="modes">
<button class="mode-btn student" onclick="setMode('student',this)">🎓 Student</button>
<button class="mode-btn business" onclick="setMode('business',this)">💼 Business</button>
<button class="mode-btn health" onclick="setMode('health',this)">🏥 Health</button>
</div>
<div class="mode-label" id="modeLabel">💼 Business Mode</div>
<div class="chat-area" id="chatArea">
<div class="msg ai-msg">Namaste! 🙏 Main ZeroScale AI hoon. Kuch bhi poochho!</div>
</div>
<div class="input-area">
<input type="text" id="userInput" placeholder="Hindi ya English mein likho..." onkeypress="if(event.key==='Enter')sendMsg()">
<button class="send-btn" onclick="sendMsg()">Send</button>
</div>
<script>
let mode='business';
const KEY='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';
const prompts={
student:'Tu ek helpful Indian student assistant hai. Hindi aur English dono mein jawab de.',
business:'Tu ek helpful Indian business assistant hai. Hindi aur English dono mein jawab de. GST, emails, social media help kar.',
health:'Tu ek helpful Indian health assistant hai. Hindi aur English dono mein jawab de. Doctor se milne ki salah do.'
};
function setMode(m,btn){
mode=m;
document.querySelectorAll('.mode-btn').forEach(b=>b.style.opacity='0.7');
btn.style.opacity='1';
const labels={student:'🎓 Student Mode',business:'💼 Business Mode',health:'🏥 Health Mode'};
document.getElementById('modeLabel').textContent=labels[m];
}
async function sendMsg(){
const inp=document.getElementById('userInput');
const txt=inp.value.trim();
if(!txt)return;
const chat=document.getElementById('chatArea');
chat.innerHTML+=`<div class="msg user-msg">${txt}</div>`;
inp.value='';
const loadId='load'+Date.now();
chat.innerHTML+=`<div class="msg ai-msg" id="${loadId}">⏳ Soch raha hoon...</div>`;
chat.scrollTop=chat.scrollHeight;
try{
const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':'Bearer '+KEY
},
body:JSON.stringify({
model:'llama-3.3-70b-versatile',
messages:[
{role:'system',content:prompts[mode]},
{role:'user',content:txt}
]
})
});
const d=await r.json();
if(d.choices&&d.choices[0]){
document.getElementById(loadId).textContent=d.choices[0].message.content;
}else{
document.getElementById(loadId).textContent='❌ Error: '+JSON.stringify(d);
}
}catch(e){
document.getElementById(loadId).textContent='❌ Network Error: '+e.message;
}
chat.scrollTop=chat.scrollHeight;
}
</script>
</body>
</html>
