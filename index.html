<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroScale AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.header{background:linear-gradient(135deg,#6c63ff,#3ecfcf);padding:20px;text-align:center}
.header h1{font-size:28px;font-weight:900}
.header p{opacity:.8;font-size:14px}
.modes{display:flex;gap:10px;padding:15px;overflow-x:auto}
.mode-btn{flex:1;min-width:100px;padding:12px;border:none;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;transition:.3s}
.mode-btn.student{background:#4CAF50;color:#fff}
.mode-btn.business{background:#6c63ff;color:#fff}
.mode-btn.health{background:#e91e8c;color:#fff}
.mode-btn.active{transform:scale(1.05);box-shadow:0 0 20px rgba(108,99,255,.5)}
.chat-area{padding:15px;height:55vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg{padding:12px 16px;border-radius:16px;max-width:85%;font-size:14px;line-height:1.5}
.user-msg{background:#6c63ff;align-self:flex-end}
.ai-msg{background:#1e1e2e;border:1px solid #333;align-self:flex-start}
.input-area{display:flex;padding:15px;gap:10px;background:#111;position:fixed;bottom:0;width:100%}
.input-area input{flex:1;padding:12px;border-radius:25px;border:1px solid #333;background:#1e1e2e;color:#fff;font-size:14px}
.input-area button{padding:12px 20px;background:linear-gradient(135deg,#6c63ff,#3ecfcf);border:none;border-radius:25px;color:#fff;font-weight:700;cursor:pointer}
.setup{padding:20px;background:#1e1e2e;margin:15px;border-radius:16px}
.setup input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #444;background:#0a0a0a;color:#fff}
.setup button{width:100%;padding:12px;background:#6c63ff;border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer}
.mode-label{text-align:center;padding:8px;background:#1e1e2e;font-size:12px;color:#aaa}
</style>
</head>
<body>
<div class="header">
<h1>⚡ ZeroScale AI</h1>
<p>India ka AI Assistant — Hindi & English</p>
</div>

<div id="setupDiv" class="setup" style="display:none">
<h3>🔑 API Key Setup</h3>
<p style="font-size:13px;color:#aaa;margin:8px 0">Apni Gemini API Key daalo</p>
<input type="password" id="apiInput" placeholder="AIzaSy...">
<button onclick="saveKey()">Save & Start</button>
</div>

<div id="mainApp" style="display:none">
<div class="modes">
<button class="mode-btn student" onclick="setMode('student',this)">🎓 Student</button>
<button class="mode-btn business active" onclick="setMode('business',this)">💼 Business</button>
<button class="mode-btn health" onclick="setMode('health',this)">🏥 Health</button>
</div>
<div class="mode-label" id="modeLabel">💼 Business Mode — GST, Email, Social Media</div>
<div class="chat-area" id="chatArea">
<div class="msg ai-msg">Namaste! 🙏 Main ZeroScale AI hoon. Business ke baare mein kuch poochho — GST, email, social media ya kuch bhi!</div>
</div>
<div style="height:80px"></div>
<div class="input-area">
<input type="text" id="userInput" placeholder="Hindi ya English mein likhо..." onkeypress="if(event.key==='Enter')sendMsg()">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<script>
let currentMode='business';
let apiKey='';

const prompts={
student:'Tu ek helpful Indian student assistant hai. Hindi aur English mein jawab de. Students ko homework, exam prep aur notes mein help kar.',
business:'Tu ek helpful Indian business assistant hai. Hindi aur English mein jawab de. Small businesses ko GST, emails, social media posts aur business advice de.',
health:'Tu ek helpful Indian health assistant hai. Hindi aur English mein jawab de. Log symptoms share karein toh unhe samjhao aur doctor se milne ki salah do. Koi diagnosis mat karo.'
};

window.onload=function(){
apiKey=localStorage.getItem('zs_key')||'';
if(apiKey){document.getElementById('mainApp').style.display='block';}
else{document.getElementById('setupDiv').style.display='block';}
}

function saveKey(){
const k=document.getElementById('apiInput').value.trim();
if(!k){alert('Key daalo!');return;}
localStorage.setItem('zs_key',k);
apiKey=k;
document.getElementById('setupDiv').style.display='none';
document.getElementById('mainApp').style.display='block';
}

function setMode(mode,btn){
currentMode=mode;
document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
const labels={student:'🎓 Student Mode — Homework, Exam, Notes',business:'💼 Business Mode — GST, Email, Social Media',health:'🏥 Health Mode — Symptoms, Doctor Tips'};
document.getElementById('modeLabel').textContent=labels[mode];
const chat=document.getElementById('chatArea');
const msgs={student:'Namaste! 🎓 Main tumhara study assistant hoon. Koi bhi subject poochho!',business:'Namaste! 💼 Business mein kya help chahiye? GST, email ya social media?',health:'Namaste! 🏥 Health ke baare mein kya poochna hai? Main help karoonga!'};
chat.innerHTML=`<div class="msg ai-msg">${msgs[mode]}</div>`;
}

async function sendMsg(){
const input=document.getElementById('userInput');
const text=input.value.trim();
if(!text)return;
const chat=document.getElementById('chatArea');
chat.innerHTML+=`<div class="msg user-msg">${text}</div>`;
input.value='';
chat.innerHTML+=`<div class="msg ai-msg" id="loading">⏳ Soch raha hoon...</div>`;
chat.scrollTop=chat.scrollHeight;
try{
const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({contents:[{parts:[{text:prompts[currentMode]+'\n\nUser: '+text}]}]})
});
const data=await res.json();
const reply=data.candidates[0].content.parts[0].text;
document.getElementById('loading').remove();
chat.innerHTML+=`<div class="msg ai-msg">${reply}</div>`;
}catch(e){
document.getElementById('loading').textContent='❌ Error! API Key check karo.';
}
chat.scrollTop=chat.scrollHeight;
}
</script>
</body>
</html>
