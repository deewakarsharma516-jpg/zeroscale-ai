function toggleSpeak(){
voiceOutputOn=!voiceOutputOn;
const btn=document.getElementById('speakBtn');
btn.classList.toggle('on',voiceOutputOn);
btn.textContent=voiceOutputOn?'🔇 Band':'🔊 Sunao';
if(!voiceOutputOn)speechSynthesis.cancel();
}

function speakText(text){
if(!voiceOutputOn)return;
speechSynthesis.cancel();
const clean=text.replace(/[*#_\-]/g,' ').replace(/\n/g,' ').trim();
const words=clean.split(' ').filter(w=>w.length>0);
const chunks=[];
let chunk=[];
let len=0;
for(let w of words){
chunk.push(w);len+=w.length+1;
if(len>=120){chunks.push(chunk.join(' '));chunk=[];len=0;}
}
if(chunk.length)chunks.push(chunk.join(' '));
let i=0;
function readNext(){
if(!voiceOutputOn||i>=chunks.length)return;
const utt=new SpeechSynthesisUtterance(chunks[i]);
const voices=speechSynthesis.getVoices();
const femaleHindi=voices.find(v=>v.lang&&v.lang.includes('hi')&&v.name.toLowerCase().includes('female'));
const femaleIndian=voices.find(v=>v.lang&&v.lang.includes('IN')&&v.name.toLowerCase().includes('female'));
const hindiVoice=voices.find(v=>v.lang&&v.lang.includes('hi'));
const indianVoice=voices.find(v=>v.lang&&v.lang.includes('IN'));
if(femaleHindi)utt.voice=femaleHindi;
else if(femaleIndian)utt.voice=femaleIndian;
else if(hindiVoice)utt.voice=hindiVoice;
else if(indianVoice)utt.voice=indianVoice;
utt.lang='hi-IN';
utt.rate=0.85;
utt.pitch=1.8;
utt.volume=1;
utt.onend=function(){i++;setTimeout(readNext,50);}
utt.onerror=function(){i++;setTimeout(readNext,50);}
speechSynthesis.speak(utt);i++;
}
setTimeout(readNext,200);
}

function toggleVoice(){
if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Chrome use karo!');return;}
if(isListening){recognition.stop();return;}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
recognition=new SR();
recognition.lang='hi-IN';recognition.continuous=false;recognition.interimResults=false;
recognition.onstart=function(){isListening=true;document.getElementById('voiceBtn').classList.add('listening');document.getElementById('voiceBtn').textContent='🔴 Sun rahi hoon...';};
recognition.onresult=function(e){document.getElementById('userInput').value=e.results[0][0].transcript;sendMsg();};
recognition.onend=function(){isListening=false;document.getElementById('voiceBtn').classList.remove('listening');document.getElementById('voiceBtn').textContent='🎤 Bolo';};
recognition.onerror=function(e){isListening=false;document.getElementById('voiceBtn').classList.remove('listening');document.getElementById('voiceBtn').textContent='🎤 Bolo';if(e.error==='not-allowed')alert('Microphone permission do!');};
recognition.start();
}

async function needsWebSearch(query){
const keywords=['kaun','kya hai','kahan','kab','kitna','price','news','aaj','latest','company','address','contact','near','faridabad','delhi','mumbai','2024','2025'];
return keywords.some(k=>query.toLowerCase().includes(k));
}

async function webSearch(query){
try{
const r=await fetch('https://api.tavily.com/search',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({api_key:TAVILY_KEY,query,search_depth:'basic',max_results:3,include_answer:true})
});
const d=await r.json();
if(d.answer)return d.answer;
if(d.results?.length>0)return d.results.map(r=>r.content).join('\n').substring(0,800);
return null;
}catch(e){return null;}
}

async function translateToEnglish(text){
try{
const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
method:'POST',
headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
body:JSON.stringify({
model:'llama-3.3-70b-versatile',
messages:[{role:'system',content:'Translate to detailed English for image generation. Include visual details. Return ONLY English.'},{role:'user',content:text}],
max_tokens:150
})
});
const d=await r.json();
return d.choices[0].message.content.trim();
}catch(e){return text;}
}

}

removeAttachment();
const loadId='load'+Date.now();
chat.innerHTML+=`<div class="msg ai-msg" id="${loadId}"><div class="typing"><span></span><span></span><span></span></div></div>`;
chat.scrollTop=chat.scrollHeight;
try{
let userContent=txt||'Batao';
let searchResult=null;
let searchDone=false;
if(txt&&await needsWebSearch(txt)){
document.getElementById(loadId).innerHTML='<div class="search-badge">🔍 Web search ho rahi hai...</div>';
searchResult=await webSearch(txt);
searchDone=true;
}
if(savedAttach.type==='file'){
userContent=`File: ${savedAttach.name}\n${savedAttach.content.substring(0,800)}\nSawaal: ${txt||'Summary'}`;
}else if(savedAttach.type==='image'){
userContent=`[Image share ki] ${txt||'Batao'}`;
}
if(searchResult){
userContent=`Search result: ${searchResult}\nSawaal: ${txt}\nSimple Hindi mein jawab do.`;
}
const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
method:'POST',
headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
body:JSON.stringify({
model:'llama-3.3-70b-versatile',
messages:[{role:'system',content:prompts[mode]},{role:'user',content:userContent}],
max_tokens:600
})
});
const d=await r.json();
if(d.choices&&d.choices[0]){
const reply=d.choices[0].message.content;
document.getElementById(loadId).innerHTML=(searchDone?'<div class="search-badge">🔍 Web search se mila</div>':'')+reply;
speakText(reply);
}else{
document.getElementById(loadId).textContent='❌ Dobara try karo!';
}
}catch(e){
document.getElementById(loadId).textContent='❌ Network Error!';
}
chat.scrollTop=chat.scrollHeight;
}

if('serviceWorker' in navigator){
navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
