<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroScale AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#6c63ff,#3ecfcf);padding:20px;text-align:center}
.header h1{font-size:28px;font-weight:900}
.header p{opacity:.8;font-size:14px}
.modes{display:flex;gap:8px;padding:12px}
.mode-btn{flex:1;padding:10px;border:none;border-radius:12px;cursor:pointer;font-size:12px;font-weight:700;opacity:0.7}
.mode-btn.student{background:#4CAF50;color:#fff}
.mode-btn.business{background:#6c63ff;color:#fff;opacity:1}
.mode-btn.health{background:#e91e8c;color:#fff}
.mode-label{text-align:center;padding:8px;background:#1e1e2e;font-size:12px;color:#aaa}
.chat-area{flex:1;padding:15px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:90px}
.msg{padding:12px 16px;border-radius:16px;max-width:85%;font-size:14px;line-height:1.5;white-space:pre-wrap}
.user-msg{background:#6c63ff;align-self:flex-end;color:#fff}
.ai-msg{background:#1e1e2e;border:1px solid #333;align-self:flex-start}
.ai-msg img{max-width:100%;border-radius:10px;margin-top:8px;display:block}
.input-area{display:flex;padding:12px;gap:6px;background:#111;position:fixed;bottom:0;width:100%;flex-wrap:wrap}
.input-area input{flex:1;min-width:120px;padding:12px;border-radius:25px;border:1px solid #333;background:#1e1e2e;color:#fff;font-size:14px}
.btn-row{display:flex;gap:6px;width:100%;justify-content:flex-end}
.send-btn{padding:10px 16px;background:linear-gradient(135deg,#6c63ff,#3ecfcf);border:none;border-radius:25px;color:#fff;font-weight:700;cursor:pointer;font-size:13px}
.voice-btn{padding:10px 14px;background:#e91e8c;border:none;border-radius:25px;color:#fff;font-size:16px;cursor:pointer}
.voice-btn.listening{background:#ff4444;animation:pulse 1s infinite}
.img-btn{padding:10px 14px;background:#4CAF50;border:none;border-radius:25px;color:#fff;font-size:16px;cursor:pointer}
.speak-btn{padding:10px 14px;background:#ff9800;border:none;border-radius:25px;color:#fff;font-size:16px;cursor:pointer}
@keyframes pulse{0%{opacity:1}50%{opacity:0.5}100%{opacity:1}}
</style>
</head>
<body>
<div class="header">
<h1>⚡ ZeroScale AI</h1>
<p>India ka AI Assistant — Hindi & English</p>
</div>
<div class="modes">
<button class="mode-btn student" onclick="setMode('student',this)">🎓 Student</button>
<button class="mode-btn business" onclick="setMode('business',this)">💼 Business</button>
<button class="mode-btn health" onclick="setMode('health',this)">🏥 Health</button>
</div>
<div class="mode-label" id="modeLabel">💼 Business Mode</div>
<div class="chat-area" id="chatArea">
<div class="msg ai-msg">Namaste! 🙏 Main ZeroScale AI hoon. Text likho, 🎤 bolo, 🖼️ image banao, ya 🔊 jawab suno!</div>
</div>
<div class="input-area">
<input type="text" id="userInput" placeholder="Likho ya voice use karo..." onkeypress="if(event.key==='Enter')sendMsg()">
<div class="btn-row">
<button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice Input">🎤</button>
<button class="img-btn" onclick="generateImage()" title="Image Banao">🖼️</button>
<button class="speak-btn" id="speakBtn" onclick="toggleSpeak()" title="Voice Output On/Off">🔊</button>
<button class="send-btn" onclick="sendMsg()">Send</button>
</div>
</div>
<script>
let mode='business';
let voiceOutputOn=false;
let lastAIResponse='';
const GROQ_KEY='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';
const prompts={
student:'Tu ek helpful Indian student assistant hai. Hindi aur English dono mein jawab de.',
business:'Tu ek helpful Indian business assistant hai. Hindi aur English dono mein jawab de. GST, emails, social media help kar.',
health:'Tu ek helpful Indian health assistant hai. Hindi aur English dono mein jawab de. Doctor se milne ki salah do.'
};
let recognition=null;
let isListening=false;

function setMode(m,btn){
mode=m;
document.querySelectorAll('.mode-btn').forEach(b=>b.style.opacity='0.7');
btn.style.opacity='1';
const labels={student:'🎓 Student Mode',business:'💼 Business Mode',health:'🏥 Health Mode'};
document.getElementById('modeLabel').textContent=labels[m];
}

function toggleSpeak(){
voiceOutputOn=!voiceOutputOn;
const btn=document.getElementById('speakBtn');
btn.style.background=voiceOutputOn?'#6c63ff':'#ff9800';
btn.textContent=voiceOutputOn?'🔇':'🔊';
if(!voiceOutputOn)speechSynthesis.cancel();
}

function speakText(text){
if(!voiceOutputOn)return;
speechSynthesis.cancel();
const clean=text.replace(/[*#]/g,'').substring(0,300);
const utt=new SpeechSynthesisUtterance(clean);
utt.lang='hi-IN';
utt.rate=0.9;
utt.pitch=1;
speechSynthesis.speak(utt);
}

function toggleVoice(){
if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
alert('Chrome browser use karo voice ke liye!');
return;
}
if(isListening){recognition.stop();return;}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
recognition=new SR();
recognition.lang='hi-IN';
recognition.continuous=false;
recognition.interimResults=false;
recognition.onstart=function(){
isListening=true;
document.getElementById('voiceBtn').classList.add('listening');
document.getElementById('voiceBtn').textContent='🔴';
document.getElementById('userInput').placeholder='Sun raha hoon...';
};
recognition.onresult=function(e){
const text=e.results[0][0].transcript;
document.getElementById('userInput').value=text;
sendMsg();
};
recognition.onend=function(){
isListening=false;
document.getElementById('voiceBtn').classList.remove('listening');
document.getElementById('voiceBtn').textContent='🎤';
document.getElementById('userInput').placeholder='Likho ya voice use karo...';
};
recognition.onerror=function(){
isListening=false;
document.getElementById('voiceBtn').classList.remove('listening');
document.getElementById('voiceBtn').textContent='🎤';
};
recognition.start();
}

async function translateToEnglish(text){
try{
const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
method:'POST',
headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
body:JSON.stringify({
model:'llama-3.3-70b-versatile',
messages:[
{role:'system',content:'Translate the following text to English. Return ONLY the translated text, nothing else.'},
{role:'user',content:text}
]
})
});
const d=await r.json();
return d.choices[0].message.content.trim();
}catch(e){
return text;
}
}

async function generateImage(){
const inp=document.getElementById('userInput');
const txt=inp.value.trim();
if(!txt){alert('Pehle kuch likho — jaise "water softener ki image"');return;}
const chat=document.getElementById('chatArea');
chat.innerHTML+=`<div class="msg user-msg">🖼️ Image: ${txt}</div>`;
inp.value='';
const loadId='load'+Date.now();
chat.innerHTML+=`<div class="msg ai-msg" id="${loadId}">⏳ Image ban rahi hai...</div>`;
chat.scrollTop=chat.scrollHeight;
const englishPrompt=await translateToEnglish(txt);
const imgUrl=`https://image.pollinations.ai/prompt/${encodeURIComponent(englishPrompt+', professional, high quality')}?width=512&height=512&nologo=true`;
const img=new Image();
img.onload=function(){
document.getElementById(loadId).innerHTML=`Image ready hai! 🎨<br><img src="${imgUrl}" alt="${txt}">`;
chat.scrollTop=chat.scrollHeight;
};
img.onerror=function(){
document.getElementById(loadId).textContent='❌ Image nahi bani — dobara try karo!';
};
img.src=imgUrl;
}

async function sendMsg(){
const inp=document.getElementById('userInput');
const txt=inp.value.trim();
if(!txt)return;
const chat=document.getElementById('chatArea');
chat.innerHTML+=`<div class="msg user-msg">${txt}</div>`;
inp.value='';
const loadId='load'+Date.now();
chat.innerHTML+=`<div class="msg ai-msg" id="${loadId}">⏳ Soch raha hoon...</div>`;
chat.scrollTop=chat.scrollHeight;
try{
const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
method:'POST',
headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
body:JSON.stringify({
model:'llama-3.3-70b-versatile',
messages:[{role:'system',content:prompts[mode]},{role:'user',content:txt}]
})
});
const d=await r.json();
if(d.choices&&d.choices[0]){
const reply=d.choices[0].message.content;
document.getElementById(loadId).textContent=reply;
speakText(reply);
}else{
document.getElementById(loadId).textContent='❌ Error: '+JSON.stringify(d);
}
}catch(e){
document.getElementById(loadId).textContent='❌ Network Error: '+e.message;
}
chat.scrollTop=chat.scrollHeight;
}
</script>
</body>
</html>
